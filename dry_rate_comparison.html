<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dry Rate Comparison</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', ui-sans-serif, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #ffffff;
    color: #37352f;
    padding: 20px 24px 32px;
    font-size: 14px;
    line-height: 1.5;
  }

  h1 {
    font-size: 13px;
    font-weight: 500;
    color: #9b9a97;
    letter-spacing: 0.01em;
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 16px;
  }

  .run-pills { display: flex; flex-wrap: wrap; gap: 5px; flex: 1; }

  .pill {
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid transparent;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.12s, background 0.12s;
    background: transparent;
    opacity: 0.22;
    line-height: 1.6;
  }
  .pill.on { opacity: 1; background: rgba(0,0,0,0.04); }
  .pill:hover { opacity: 0.65; }

  .right-controls { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

  .seg {
    display: flex;
    border: 1px solid #e3e2e0;
    border-radius: 6px;
    overflow: hidden;
    background: #f7f6f3;
  }
  .seg button {
    padding: 4px 11px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 400;
    background: transparent;
    color: #9b9a97;
    border: none;
    cursor: pointer;
    transition: all 0.12s;
    line-height: 1.6;
  }
  .seg button + button { border-left: 1px solid #e3e2e0; }
  .seg button.active { background: #ffffff; color: #37352f; font-weight: 500; }
  .seg button:hover:not(.active) { color: #37352f; }

  .slider-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #9b9a97;
  }
  .slider-wrap input[type=range] {
    -webkit-appearance: none;
    width: 90px;
    height: 4px;
    background: #e3e2e0;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .slider-wrap input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #37352f;
    cursor: pointer;
  }
  .slider-wrap .val { color: #37352f; font-weight: 500; min-width: 38px; text-align: right; font-size: 12px; }

  .chart-wrap {
    position: relative;
    width: 100%;
    height: 400px;
    background: #ffffff;
    border: 1px solid #e3e2e0;
    border-radius: 8px;
    padding: 14px 14px 14px 14px;
  }

  .loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #c7c6c3; pointer-events: none; font-weight: 400;
  }

  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: #6b6a67;
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend-peak { color: #c7c6c3; margin-left: 1px; }

  .ev-btn {
    font-family: inherit; font-size: 12px; font-weight: 400;
    background: transparent; color: #9b9a97;
    border: 1px solid #e3e2e0; border-radius: 6px;
    padding: 4px 10px; cursor: pointer; transition: all 0.12s;
    line-height: 1.6;
  }
  .ev-btn.on { background: #f7f6f3; color: #37352f; border-color: #c7c6c3; font-weight: 500; }

  .divider {
    width: 1px; height: 18px; background: #e3e2e0; flex-shrink: 0;
  }
</style>
</head>
<body>

<h1>Dry rate — aligned to oil @ 185 °C</h1>

<div class="controls">
  <div class="run-pills" id="pills"></div>
  <div class="divider"></div>
  <div class="right-controls">
    <button class="ev-btn" id="evBtn" onclick="toggleEvents()">Events</button>
    <div class="seg">
      <button id="btnRaw"    onclick="setView('raw')">Raw</button>
      <button id="btnSmooth" class="active" onclick="setView('smooth')">Smoothed</button>
      <button id="btnBoth"   onclick="setView('both')">Both</button>
    </div>
    <div class="slider-wrap">
      <span>Avg</span>
      <input type="range" id="winSlider" min="1" max="60" value="10" step="1" oninput="onSlider(this.value)">
      <span class="val" id="winVal">10 min</span>
    </div>
  </div>
</div>

<div class="chart-wrap">
  <div class="loading" id="loading">Loading…</div>
  <canvas id="chart" role="img" aria-label="Dry rate comparison across runs, aligned to oil reaching 185°C"></canvas>
</div>

<div class="legend" id="legend"></div>

<script>
const BASE = 'https://raw.githubusercontent.com/emilywang-mill/emily-bigbird/main/data/';

const RUNS = {
  '0302': { label: '0302 — 180°C / 35%',               color: '#8b5cf6' },
  '0407': { label: '0407 — water',                      color: '#ef4444' },
  '0409': { label: '0409 — 180°C / 35%',                color: '#f97316' },
  '0415': { label: '0415',                               color: '#14b8a6' },
  '0416': { label: '0416 — varying',                    color: '#22c55e' },
  '0420': { label: '0420 — 180°C / 35% PWM',            color: '#06b6d4' },
  '0421': { label: '0421 — 130°C / 70% PWM',            color: '#3b82f6' },
  '0422': { label: '0422 — control (24 RPM)',            color: '#10b981' },
  '0423': { label: '0423 — grind patterns',              color: '#a855f7' },
  '0427': { label: '0427 — high grind (34 RPM)',         color: '#f43f5e' },
  '0428': { label: '0428 — 190°C / 15%',                color: '#6366f1' },
  '0504': { label: '0504',                               color: '#0ea5e9' },
  '0505': { label: '0505 — asymmetric',                  color: '#ec4899' },
};

const EVENTS = {
  '0423': [
    { ts: '2026-04-23 11:48:00', label: '24, 90/30/270' },
    { ts: '2026-04-23 12:16:00', label: '24, 30/30/330' },
    { ts: '2026-04-23 12:45:00', label: '24, 30/5/330'  },
    { ts: '2026-04-23 13:20:00', label: '30, 30/5/330'  },
    { ts: '2026-04-23 13:51:00', label: '30, 270/5/90'  },
    { ts: '2026-04-23 14:25:00', label: '24, 90/30/270' },
    { ts: '2026-04-23 15:11:00', label: '24, 1/1/1000'  },
  ],
  '0428': [
    { ts: '2026-04-28 09:52:00', label: '200°C 15% — trip' },
    { ts: '2026-04-28 10:33:00', label: '180°C 20% — trip' },
    { ts: '2026-04-28 11:42:00', label: '180°C 25% — trip' },
    { ts: '2026-04-28 11:48:00', label: '180°C 80% PWM'    },
  ],
  '0416': [
    { ts: '2026-04-16 10:35:00', label: '120°C 70%'     },
    { ts: '2026-04-16 11:05:00', label: '120°C 30%'     },
    { ts: '2026-04-16 11:46:00', label: '150°C 30%'     },
    { ts: '2026-04-16 12:33:00', label: '130°C 70%'     },
    { ts: '2026-04-16 14:40:00', label: 'CD 185→120°C'  },
    { ts: '2026-04-16 16:11:00', label: 'CD 120→60°C'   },
  ],
};

const OIL_ALIGN = 185, DR_MAX = 400, DR_MIN = -20;
let datasets = {}, activeRuns = new Set(['0422','0423','0427']);
let winMin = 10, viewMode = 'smooth', showEvents = false, chart = null;
let yMin = -25, yMax = null;

function rolling(arr, win) {
  const h = Math.floor(win / 2);
  return arr.map((_,i) => {
    const lo = Math.max(0, i-h), hi = Math.min(arr.length-1, i+h);
    let s=0,c=0; for(let j=lo;j<=hi;j++){s+=arr[j];c++;} return s/c;
  });
}
function parseTs(s) { return new Date(s.replace(' ','T')).getTime(); }

function processCSV(rows) {
  rows = rows.filter(r => r.elapsed_hr !== undefined && r.elapsed_hr !== '');
  rows.sort((a,b) => +a.elapsed_hr - +b.elapsed_hr);
  const oilCol = Object.keys(rows[0]||{}).find(k => k.includes('jacket_oil_temperature'));
  const drCol  = Object.keys(rows[0]||{}).find(k => k.includes('dry_rate_g_min'));
  const oils = rows.map(r => parseFloat(r[oilCol])||0);
  const dr   = rows.map(r => Math.min(DR_MAX, Math.max(DR_MIN, parseFloat(r[drCol])||0)));
  const el   = rows.map(r => parseFloat(r.elapsed_hr));
  const ts   = rows.map(r => r.time||'');
  const hi   = oils.findIndex(t => t >= OIL_ALIGN);
  const t0el = hi>=0 ? el[hi] : 0;
  const t0ts = hi>=0 ? parseTs(ts[hi]) : null;
  return { tHr: el.map(e=>e-t0el), drRaw: dr, tZeroTs: t0ts };
}

function loadRun(name) {
  if (datasets[name]) return Promise.resolve(datasets[name]);
  return new Promise((res,rej) => {
    Papa.parse(BASE+name+'.csv', {
      download:true, header:true, skipEmptyLines:true,
      complete: r => { datasets[name]=processCSV(r.data); res(datasets[name]); },
      error: rej,
    });
  });
}

function computeYBounds() {
  let max = 0;
  for (const name of activeRuns) {
    const d = datasets[name]; if(!d) continue;
    const sm = rolling(d.drRaw, winMin);
    const src = (viewMode==='raw') ? d.drRaw : sm;
    src.forEach(v => { if(v>max) max=v; });
  }
  yMax = max > 0 ? Math.ceil(max * 1.12 / 10) * 10 : 300;
  yMin = -25;
}

function buildChartData() {
  const out = [];
  for (const name of activeRuns) {
    const d = datasets[name]; if(!d) continue;
    const { color } = RUNS[name];
    const sm = rolling(d.drRaw, winMin);
    if (viewMode==='raw'||viewMode==='both') {
      out.push({
        label: name+'_raw',
        data: d.tHr.map((t,i)=>({x:+t.toFixed(4), y:+d.drRaw[i].toFixed(2)})),
        borderColor: color, backgroundColor:'transparent',
        borderWidth: viewMode==='both'?0.7:1.2,
        borderDash: viewMode==='both'?[3,3]:[],
        pointRadius:0, tension:0, parsing:false,
        _run:name, _raw:true,
      });
    }
    if (viewMode==='smooth'||viewMode==='both') {
      out.push({
        label: name+'_sm',
        data: d.tHr.map((t,i)=>({x:+t.toFixed(4), y:+sm[i].toFixed(2)})),
        borderColor: color, backgroundColor:'transparent',
        borderWidth:2, pointRadius:0, tension:0, parsing:false,
        _run:name, _sm:true,
      });
    }
  }
  return out;
}

const eventPlugin = {
  id: 'evLines',
  afterDraw(chart) {
    if (!showEvents) return;
    const { ctx, scales:{x,y}, chartArea:{top,bottom} } = chart;
    for (const name of activeRuns) {
      const d = datasets[name]; if(!d||!d.tZeroTs||!EVENTS[name]) continue;
      const color = RUNS[name].color;
      EVENTS[name].forEach((ev,ei) => {
        const evThr = (parseTs(ev.ts) - d.tZeroTs) / 3600000;
        const xPx = x.getPixelForValue(evThr);
        if (xPx < chart.chartArea.left || xPx > chart.chartArea.right) return;
        ctx.save();
        ctx.strokeStyle = color;
        ctx.globalAlpha = 0.35;
        ctx.lineWidth = 1;
        ctx.setLineDash([4,4]);
        ctx.beginPath(); ctx.moveTo(xPx,top); ctx.lineTo(xPx,bottom); ctx.stroke();
        ctx.setLineDash([]);
        ctx.globalAlpha = 0.65;
        ctx.fillStyle = color;
        ctx.font = '500 9.5px Inter, sans-serif';
        ctx.textAlign = 'left';
        const textY = top + 12 + (ei % 5) * 58;
        ctx.translate(xPx+3, Math.min(textY, bottom-10));
        ctx.rotate(-Math.PI/2);
        ctx.fillText(ev.label, 0, 0);
        ctx.restore();
      });
    }
  }
};

function buildChart() {
  const canvas = document.getElementById('chart');
  if (chart) { chart.destroy(); chart=null; }
  computeYBounds();

  const grid = 'rgba(55,53,47,0.06)';
  const tick = '#9b9a97';
  const fontCfg = { family:"'Inter', ui-sans-serif, sans-serif", size:11 };

  chart = new Chart(canvas, {
    type:'line',
    data:{ datasets: buildChartData() },
    options:{
      responsive:true, maintainAspectRatio:false, animation:false,
      clip: { left:0, right:0, top:0, bottom:0 },
      plugins:{
        legend:{ display:false },
        tooltip:{
          backgroundColor:'#fff', borderColor:'#e3e2e0', borderWidth:1,
          titleColor:'#37352f', bodyColor:'#6b6a67', padding:10,
          titleFont:{ family:"'Inter',sans-serif", size:12, weight:'500' },
          bodyFont:{ family:"'Inter',sans-serif", size:12 },
          callbacks:{
            title: items => `t = ${items[0].parsed.x.toFixed(2)} hr`,
            label: item => ` ${RUNS[item.dataset._run]?.label}: ${item.parsed.y.toFixed(1)} g/min`,
          }
        }
      },
      scales:{
        x:{
          type:'linear',
          title:{ display:true, text:'Elapsed time since oil @ 185°C  (hr)', color:tick, font:fontCfg },
          grid:{ color:grid }, border:{ color:'#e3e2e0' },
          ticks:{ color:tick, font:fontCfg, maxTicksLimit:12 },
        },
        y:{
          title:{ display:true, text:'Dry rate  (g/min)', color:tick, font:fontCfg },
          grid:{ color:grid }, border:{ color:'#e3e2e0' },
          ticks:{ color:tick, font:fontCfg },
          min: yMin, max: yMax,
        }
      }
    },
    plugins:[eventPlugin],
  });
}

function updateLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  for (const name of activeRuns) {
    const d = datasets[name]; if(!d) continue;
    const sm = rolling(d.drRaw, winMin);
    const peak = Math.max(...sm).toFixed(0);
    const { color, label } = RUNS[name];
    el.innerHTML += `<div class="legend-item">
      <span class="legend-dot" style="background:${color}"></span>
      <span>${label}</span>
      <span class="legend-peak">peak ${peak} g/min</span>
    </div>`;
  }
}

function rebuildChart() {
  computeYBounds();
  if (chart) {
    chart.data.datasets = buildChartData();
    chart.options.scales.y.min = yMin;
    chart.options.scales.y.max = yMax;
    chart.update('none');
  } else {
    buildChart();
  }
  updateLegend();
}

async function toggleRun(name) {
  const pill = document.getElementById('pill-'+name);
  if (activeRuns.has(name)) {
    activeRuns.delete(name); pill.classList.remove('on'); rebuildChart();
  } else {
    activeRuns.add(name);
    if (!datasets[name]) {
      const orig = pill.textContent; pill.textContent = name+' …';
      try { await loadRun(name); pill.textContent = orig; }
      catch { pill.textContent = name+' ✕'; activeRuns.delete(name); pill.classList.remove('on'); return; }
    }
    pill.classList.add('on'); rebuildChart();
  }
}

function setView(v) {
  viewMode = v;
  ['Raw','Smooth','Both'].forEach(s =>
    document.getElementById('btn'+s).classList.toggle('active', v===s.toLowerCase()));
  rebuildChart();
}

function onSlider(v) {
  winMin = parseInt(v);
  document.getElementById('winVal').textContent = v+' min';
  rebuildChart();
}

function toggleEvents() {
  showEvents = !showEvents;
  document.getElementById('evBtn').classList.toggle('on', showEvents);
  if (chart) chart.update('none');
}

async function init() {
  const pillsEl = document.getElementById('pills');
  for (const [name, meta] of Object.entries(RUNS)) {
    const btn = document.createElement('button');
    btn.className = 'pill'+(activeRuns.has(name)?' on':'');
    btn.id = 'pill-'+name;
    btn.textContent = name;
    btn.style.cssText = `border-color:${meta.color};color:${meta.color};`;
    btn.onclick = () => toggleRun(name);
    pillsEl.appendChild(btn);
  }
  document.getElementById('loading').style.display='flex';
  await Promise.all([...activeRuns].map(n => loadRun(n).catch(()=>activeRuns.delete(n))));
  document.getElementById('loading').style.display='none';
  buildChart(); updateLegend();
}

init();
</script>
</body>
</html>
