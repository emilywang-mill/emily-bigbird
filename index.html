<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mill Sensor Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@500;600&display=swap');

:root {
  --bg:      #f5f4f1;
  --surface: #ffffff;
  --surf2:   #f0efe9;
  --border:  #e3e2dc;
  --border2: #cccbc3;
  --text:    #2a2825;
  --muted:   #7a7870;
  --muted2:  #aaa99f;
  --accent:  #1a6e3c;
  --danger:  #c0392b;
  --mono:    'JetBrains Mono', monospace;
  --ui:      'Syne', system-ui, sans-serif;
}

* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  padding: 20px 24px 48px;
  font-size: 12px;
}

header {
  display:flex; align-items:baseline; gap:14px;
  margin-bottom:16px; padding-bottom:12px;
  border-bottom:1px solid var(--border);
}
header h1 { font-family:var(--ui); font-size:15px; font-weight:600; letter-spacing:.01em; }
header .sub { font-size:11px; color:var(--muted); font-weight:300; }
header .status { margin-left:auto; font-size:10px; color:var(--muted2); display:flex; align-items:center; gap:6px; }
header .status .dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 2.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

/* ─ top panel ─ */
.panel { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:10px 14px; }
.panel-label { font-size:9px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--muted2); margin-bottom:8px; }
.run-pills { display:flex; flex-wrap:wrap; gap:4px; }
.pill { padding:3px 8px; border-radius:3px; border:1px solid transparent; font-family:var(--mono); font-size:11px; cursor:pointer; transition:all .1s; background:transparent; color:var(--muted2); opacity:.45; line-height:1.5; }
.pill.on { opacity:1; background:rgba(0,0,0,.04); }
.pill:hover { opacity:.75; }

/* ─ controls bar ─ */
.controls-bar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:12px; }
.seg { display:flex; border:1px solid var(--border); border-radius:4px; overflow:hidden; background:var(--surf2); }
.seg button { padding:4px 11px; font-family:var(--mono); font-size:11px; background:transparent; color:var(--muted); border:none; cursor:pointer; transition:all .1s; }
.seg button+button { border-left:1px solid var(--border); }
.seg button.active { background:var(--surface); color:var(--text); font-weight:500; }
.seg button:hover:not(.active) { color:var(--text); }
.slider-wrap { display:flex; align-items:center; gap:7px; font-size:11px; color:var(--muted); }
.slider-wrap input[type=range] { -webkit-appearance:none; width:80px; height:3px; background:var(--border2); border-radius:2px; outline:none; cursor:pointer; }
.slider-wrap input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; border-radius:50%; background:var(--text); cursor:pointer; }
.slider-wrap .val { color:var(--text); font-weight:500; min-width:34px; text-align:right; }
.ctrl-btn { font-family:var(--mono); font-size:11px; background:var(--surface); color:var(--muted); border:1px solid var(--border); border-radius:4px; padding:4px 10px; cursor:pointer; transition:all .1s; }
.ctrl-btn.on { background:var(--surf2); color:var(--text); border-color:var(--border2); font-weight:500; }
.ctrl-btn:hover { color:var(--text); border-color:var(--border2); }
.add-ch-btn { padding:4px 10px; border-radius:4px; border:1px dashed var(--border2); font-family:var(--mono); font-size:11px; cursor:pointer; background:transparent; color:var(--muted); transition:all .1s; }
.add-ch-btn:hover { color:var(--accent); border-color:var(--accent); }
.spacer { flex:1; }
.channel-strip { display:flex; flex-wrap:wrap; gap:4px; }
.ch-chip { padding:3px 8px; border-radius:3px; border:1px solid var(--border); font-family:var(--mono); font-size:10px; cursor:pointer; background:var(--surface); color:var(--muted); display:flex; align-items:center; gap:5px; transition:all .1s; }
.ch-chip:hover { border-color:var(--border2); color:var(--text); }
.ch-dot { width:6px; height:6px; border-radius:1px; flex-shrink:0; }
.zoom-reset { display:none; font-family:var(--mono); font-size:10px; background:var(--surface); color:var(--muted2); border:1px solid var(--border); border-radius:3px; padding:3px 8px; cursor:pointer; transition:all .1s; }
.zoom-reset.vis { display:inline-block; }
.zoom-reset:hover { color:var(--danger); border-color:var(--danger); }

/* ─ modal ─ */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:100; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border2); border-radius:8px; padding:20px; width:680px; max-height:82vh; overflow-y:auto; box-shadow:0 8px 40px rgba(0,0,0,.14); }
.modal h3 { font-family:var(--ui); font-size:13px; font-weight:600; margin-bottom:12px; }
.modal-search { width:100%; padding:6px 10px; background:var(--bg); border:1px solid var(--border2); border-radius:4px; font-family:var(--mono); font-size:11px; color:var(--text); outline:none; margin-bottom:10px; }
.modal-search::placeholder { color:var(--muted2); }
.modal-group-label { font-size:9px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--muted2); margin:10px 0 5px; padding-bottom:4px; border-bottom:1px solid var(--border); }
.modal-cols { display:grid; grid-template-columns:1fr 1fr; gap:3px; }
.mci { display:flex; align-items:center; gap:6px; padding:5px 8px; border-radius:3px; cursor:pointer; font-size:10px; color:var(--muted); border:1px solid transparent; transition:all .1s; }
.mci:hover { background:var(--surf2); color:var(--text); }
.mci.sel { background:var(--surf2); color:var(--text); border-color:var(--border2); }
.mci .chk { color:var(--accent); font-weight:700; width:12px; font-size:10px; }
.mci .unit { color:var(--muted2); margin-left:auto; font-size:9px; }
.modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:14px; padding-top:12px; border-top:1px solid var(--border); }
.btn { padding:5px 14px; border-radius:4px; font-family:var(--mono); font-size:11px; cursor:pointer; border:1px solid var(--border2); background:transparent; color:var(--muted); transition:all .1s; }
.btn:hover { color:var(--text); border-color:var(--text); }
.btn.primary { background:var(--text); color:#fff; border-color:var(--text); font-weight:500; }
.btn.primary:hover { opacity:.8; }

/* ─ charts ─ */
#charts-container { display:flex; flex-direction:column; gap:8px; }
.chart-row { background:var(--surface); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
.chart-row-header { display:flex; align-items:center; gap:7px; padding:7px 12px 6px; border-bottom:1px solid var(--border); background:var(--surf2); }
.chart-row-title { font-family:var(--ui); font-size:11px; font-weight:500; color:var(--muted); letter-spacing:.03em; }
.chart-row-remove { margin-left:auto; background:none; border:none; color:var(--muted2); cursor:pointer; font-size:14px; line-height:1; padding:1px 4px; transition:color .1s; border-radius:3px; }
.chart-row-remove:hover { color:var(--danger); }
.chart-canvas-wrap { position:relative; height:210px; padding:6px 8px; cursor:crosshair; }
.chart-loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--muted2); background:var(--surface); z-index:2; pointer-events:none; }
.chart-legend { display:flex; flex-wrap:wrap; gap:8px; padding:5px 12px 9px; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--muted); }
.legend-dot { width:7px; height:7px; border-radius:1px; flex-shrink:0; }
.legend-peak { color:var(--muted2); margin-left:2px; }

/* ─ y-axis scale control ─ */
.y-scale-wrap { display:flex; align-items:center; gap:4px; margin-left:8px; }
.y-scale-input { width:54px; padding:2px 5px; font-family:var(--mono); font-size:10px;
  background:var(--bg); border:1px solid var(--border); border-radius:3px; color:var(--text);
  outline:none; text-align:right; -moz-appearance:textfield; }
.y-scale-input::-webkit-inner-spin-button,.y-scale-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.y-scale-input:focus { border-color:var(--border2); }
.y-scale-input.active { border-color:var(--accent); background:rgba(26,110,60,.05); }
.y-scale-sep { font-size:10px; color:var(--muted2); }
.y-scale-reset { font-size:9px; color:var(--muted2); cursor:pointer; background:none; border:none;
  padding:1px 3px; border-radius:2px; font-family:var(--mono); transition:color .1s; line-height:1; }
.y-scale-reset:hover { color:var(--danger); }

/* ─ crosshair + tooltip ─ */
#crosshair-overlay { position:fixed; top:0; left:0; width:1px; pointer-events:none; z-index:50; background:rgba(26,110,60,.5); display:none; }
#tooltip-card { position:fixed; background:var(--surface); border:1px solid var(--border2); border-radius:5px; padding:8px 12px; font-size:11px; pointer-events:none; z-index:60; display:none; max-width:290px; box-shadow:0 4px 20px rgba(0,0,0,.12); }
#tooltip-card .tt-time { color:var(--muted); font-size:10px; margin-bottom:5px; border-bottom:1px solid var(--border); padding-bottom:4px; }
#tooltip-card .tt-sect { font-size:9px; color:var(--muted2); margin:6px 0 2px; letter-spacing:.08em; text-transform:uppercase; }
#tooltip-card .tt-row { display:flex; align-items:center; gap:6px; margin-top:2px; font-size:10px; }
#tooltip-card .tt-dot { width:6px; height:6px; border-radius:1px; flex-shrink:0; }
#tooltip-card .tt-run { color:var(--muted); }
#tooltip-card .tt-val { color:var(--text); margin-left:auto; font-weight:500; }

.loading-bar { text-align:center; padding:28px; color:var(--muted); font-size:11px; }
</style>
</head>
<body>

<header>
  <h1>Mill Sensor Dashboard</h1>
  <span class="sub">emily-bigbird / data</span>
  <div class="status"><span class="dot"></span><span id="statusText">loading…</span></div>
</header>

<div style="margin-bottom:12px;">
  <div class="panel" style="display:inline-block;min-width:300px;max-width:100%;">
    <div class="panel-label">Runs</div>
    <div class="run-pills" id="pills"><span style="color:var(--muted2)">discovering…</span></div>
  </div>
</div>

<div class="controls-bar">
  <button class="ctrl-btn" id="evBtn" onclick="toggleEvents()">Events</button>

  <div class="seg">
    <button id="btnRaw"    onclick="setView('raw')">Raw</button>
    <button id="btnSmooth" class="active" onclick="setView('smooth')">Smoothed</button>
    <button id="btnBoth"   onclick="setView('both')">Both</button>
  </div>

  <div class="slider-wrap">
    <span>Avg</span>
    <input type="range" id="winSlider" min="1" max="60" value="10" step="1" oninput="onSlider(this.value)">
    <span class="val" id="winVal">10 min</span>
  </div>

  <div class="seg">
    <button id="btnZoom" class="active" onclick="setInteraction('zoom')" title="Drag to zoom, scroll wheel to zoom">Zoom</button>
    <button id="btnPan"  onclick="setInteraction('pan')"  title="Click and drag to pan">Pan</button>
  </div>
  <button class="zoom-reset" id="zoomReset" onclick="resetAllZoom()">↺ Reset zoom</button>
  <button class="ctrl-btn on" id="ttBtn" onclick="toggleTooltip()" title="Toggle hover tooltip">Tooltip</button>

  <div class="seg">
    <button id="btnXTime" class="active" onclick="setXMode('time')">Time</button>
    <button id="btnXMass" onclick="setXMode('mass')">Water removed</button>
  </div>

  <div class="seg">
    <button id="btnAlignOil"  onclick="setAlign('oil')">Align: Oil</button>
    <button id="btnAlignRamp" class="active" onclick="setAlign('ramp')">Align: DR ramp</button>
  </div>

  <div class="spacer"></div>
  <div class="channel-strip" id="activeChannels"></div>
  <button class="add-ch-btn" onclick="openChannelPicker()">+ Add plot</button>
</div>

<div id="charts-container">
  <div class="loading-bar" id="initLoading">Fetching run list from GitHub…</div>
</div>

<div id="crosshair-overlay"></div>
<div id="tooltip-card"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Add plot</h3>
    <input class="modal-search" id="modalSearch" placeholder="Search sensors…" oninput="filterModal(this.value)">
    <div id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="confirmModal()">Add selected</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════
const REPO     = 'emilywang-mill/emily-bigbird';
const BRANCH   = 'main';
const BASE     = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/data/`;
const API_BASE = `https://api.github.com/repos/${REPO}/contents`;
const OIL_ALIGN = 185, DR_MAX = 400, DR_MIN = -20;

// Sensor definitions (colMatch = substring to search in CSV header)
// Pressure naming per user spec:
//   PV IN   → Process Vessel ΔP    (d204)
//   PV OUT  → Condenser ΔP         (d207 outlet is actually condenser side)
//   Air heater out → Blower Fan ΔP (d407)
const SENSORS = [
  // ── Derived ──────────────────────────────────────────────
  { m:'dry_rate_g_min',   l:'Dry Rate',          u:'g/min',  g:'Derived', c:'#1a6e3c', derived:true },
  { m:'predicted_mc_pct', l:'Estimated MC',       u:'%',      g:'Derived', c:'#059669', derived:true },
  { m:'__airflow__',      l:'Estimated Airflow',  u:'CFM',    g:'Derived', c:'#0284c7', derived:true },
  { m:'total_kwh_per_kg', l:'Total kWh/kg',       u:'kWh/kg', g:'Derived', c:'#b45309', derived:true },
  // ── Energy (kWh per subsystem, from exporter) ────────────
  { m:'motor_kwh',   l:'Motor kWh',      u:'kWh', g:'Energy', c:'#1d4ed8' },
  { m:'oil_kwh',     l:'Oil Heater kWh', u:'kWh', g:'Energy', c:'#8b5cf6' },
  { m:'cooling_kwh', l:'Condenser kWh',  u:'kWh', g:'Energy', c:'#db2777' },
  { m:'blower_kwh',  l:'Blower kWh',     u:'kWh', g:'Energy', c:'#064e3b' },
  { m:'air_kwh',     l:'Air Heater kWh', u:'kWh', g:'Energy', c:'#f59e0b' },
  { m:'__total_kwh__', l:'Total kWh',      u:'kWh', g:'Energy', c:'#111827', derived:true },
  // ── Process Vessel ──────────────────────────────────────
  { m:'mass_g',                                   l:'Mass',                       u:'g',      g:'Process Vessel',     c:'#3a9e5c' },
  { m:'d208_jacket_oil_temperature',              l:'Oil Temp',                   u:'°C',     g:'Process Vessel',     c:'#d4700a' },
  { m:'d202_oil_heater_controller_pwm_1',         l:'Oil Heater PWM',             u:'%',      g:'Process Vessel',     c:'#e8930d' },
  { m:'d201_motor_speed',                         l:'Motor Speed',                u:'RPM',    g:'Process Vessel',     c:'#1a4e8a' },
  { m:'d201_motor_speed_setpoint',                l:'Motor Speed Setpoint',       u:'RPM',    g:'Process Vessel',     c:'#3a6eaa' },
  { m:'d201_motor_power',                         l:'Motor Power',                u:'W',      g:'Process Vessel',     c:'#4a7eba' },
  { m:'d201_motor_current',                       l:'Motor Current',              u:'A',      g:'Process Vessel',     c:'#5a8eca' },
  { m:'d201_motor_torque_percent',                l:'Motor Torque',               u:'%',      g:'Process Vessel',     c:'#6a9eda' },
  { m:'d201_motor_igbt_temperature',              l:'Motor IGBT Temp',            u:'°C',     g:'Process Vessel',     c:'#7aaee0' },
  { m:'d201_motor_dc_bus_voltage',                l:'Motor DC Bus Voltage',       u:'V',      g:'Process Vessel',     c:'#8abee8' },
  // ── Process Vessel Air ───────────────────────────────────
  { m:'d205_process_vessel_outlet_temperature_1', l:'PV Outlet Air Temp',         u:'°C',     g:'PV Air',             c:'#c0392b' },
  { m:'d206_process_vessel_outlet_temperature_2', l:'PV Outlet Air Temp 2',       u:'°C',     g:'PV Air',             c:'#d44b3c' },
  { m:'d206_process_vessel_outlet_dew_point',     l:'PV Outlet Dew Point',        u:'°C',     g:'PV Air',             c:'#e05d4e' },
  { m:'d206_process_vessel_outlet_mixing_ratio',  l:'PV Outlet Mixing Ratio',     u:'g/kg',   g:'PV Air',             c:'#e86f60' },
  { m:'d206_process_vessel_outlet_relative_humidity', l:'PV Outlet RH',           u:'%',      g:'PV Air',             c:'#f08072' },
  // ── Pressure ─────────────────────────────────────────────
  { m:'d204_process_vessel_inlet_gauge_pressure', l:'PV ΔP',                      u:'Pa',     g:'Pressure',           c:'#7c3aed' },
  { m:'d207_process_vessel_outlet_gauge_pressure',l:'Condenser ΔP (PV Out)',      u:'Pa',     g:'Pressure',           c:'#8b4cf0' },
  { m:'d407_air_heater_outlet_gauge_pressure',    l:'Blower Fan ΔP',              u:'Pa',     g:'Pressure',           c:'#d394f8' },
  // ── Air Handler ──────────────────────────────────────────
  { m:'d401_air_heater_controller_pwm',           l:'Air Heater PWM',             u:'%',      g:'Air Handler',        c:'#0891b2' },
  { m:'d402_blower_fan_controller_pwm',           l:'Blower Fan PWM',             u:'%',      g:'Air Handler',        c:'#06b6d4' },
  { m:'d402_blower_fan_controller_setpoint',      l:'Blower Fan Setpoint',        u:'%',      g:'Air Handler',        c:'#0284c7' },
  { m:'d405_blower_inlet_relative_humidity',      l:'Blower Inlet RH',            u:'%',      g:'Air Handler',        c:'#67e8f9' },
  // ── Temperature ─────────────────────────────────────────
  { m:'d403_blower_fan_inlet_temperature_1',      l:'Blower Fan Inlet Temp',      u:'°C',     g:'Temperature',        c:'#22d3ee' },
  { m:'d405_blower_inlet_temperature_2',          l:'Blower Inlet Temp',          u:'°C',     g:'Temperature',        c:'#164e63' },
  { m:'d408_air_heater_outlet_temperature',       l:'Air Heater Outlet Temp',     u:'°C',     g:'Temperature',        c:'#0e7490' },
  { m:'d302_condenser_inlet_temperature',         l:'Condenser Inlet Temp',       u:'°C',     g:'Temperature',        c:'#be185d' },
  { m:'d304_condenser_outlet_temperature_1',      l:'Condenser Outlet Temp',      u:'°C',     g:'Temperature',        c:'#db2777' },
  { m:'d305_condenser_outlet_temperature_2',      l:'Condenser Outlet Temp 2',    u:'°C',     g:'Temperature',        c:'#f472b6' },
  { m:'d307_ambient',                             l:'Ambient Temp',               u:'°C',     g:'Temperature',        c:'#9f1239' },
  { m:'d308_cooling_air_inlet_temperature',       l:'Cooling Air Inlet Temp',     u:'°C',     g:'Temperature',        c:'#c026d3' },
  { m:'d309_cooling_air_outlet_temperature',      l:'Cooling Air Outlet Temp',    u:'°C',     g:'Temperature',        c:'#e879f9' },
  { m:'d310_condensate_temperature',              l:'Condensate Temp',            u:'°C',     g:'Temperature',        c:'#6b21a8' },
  { m:'d311_condensate_drum_inlet_temperature',   l:'Condensate Inlet Temp',      u:'°C',     g:'Temperature',        c:'#4c1d95' },
  // ── External Thermocouples — column names match CSV: thermocouples__chX ────
  // ch0=wall_high  ch1=wall_low  ch2=cond_in   ch3=cond_out
  // ch4=cool_air_in  ch5=heat_air_out  ch6=cool_air_out  ch7=ambient
  { m:'thermocouples__ch0', l:'Wall High Temp',    u:'°C', g:'External Thermocouples', c:'#b91c1c' },
  { m:'thermocouples__ch1', l:'Wall Low Temp',     u:'°C', g:'External Thermocouples', c:'#dc2626' },
  { m:'thermocouples__ch2', l:'Cond In Temp',      u:'°C', g:'External Thermocouples', c:'#ef4444' },
  { m:'thermocouples__ch3', l:'Cond Out Temp',     u:'°C', g:'External Thermocouples', c:'#f87171' },
  { m:'thermocouples__ch4', l:'Cool Air In Temp',  u:'°C', g:'External Thermocouples', c:'#fca5a5' },
  { m:'thermocouples__ch5', l:'Heat Air Out Temp', u:'°C', g:'External Thermocouples', c:'#fb923c' },
  { m:'thermocouples__ch6', l:'Cool Air Out Temp', u:'°C', g:'External Thermocouples', c:'#f97316' },
  { m:'thermocouples__ch7', l:'Ambient Temp (TC)', u:'°C', g:'External Thermocouples', c:'#ea580c' },
  // ── Condenser ────────────────────────────────────────────
  { m:'d305_condenser_outlet_relative_humidity',  l:'Condenser Outlet RH',        u:'%',      g:'Condenser',          c:'#ec4899' },
  { m:'d301_cooling_fan_controller_pwm',          l:'Cooling Fan PWM',            u:'%',      g:'Condenser',          c:'#9d174d' },
  { m:'d307_ambient_relative_humidity',           l:'Ambient RH',                 u:'%',      g:'Condenser',          c:'#831843' },

async function tryLoadEvents() {

    `https://raw.githubusercontent.com/${REPO}/${BRANCH}/events.py`,
    `https://raw.githubusercontent.com/${REPO}/${BRANCH}/run_events.py`,
  ]) {

      const txt=await r.text();
      if(url.endsWith('.json')){ try{mergeEv(JSON.parse(txt));return;}catch{} }
      const p=parsePy(txt); if(p){mergeEv(p);return;}
    } catch {}
  }
}
function parsePy(src){
  const res={}, br=/"(\d{4})"\s*:\s*\[([^\]]*)\]/gs; let m;
  while((m=br.exec(src))!==null){
    const evs=[]; const er=/\{[^}]*"timestamp"\s*:\s*"([^"]+)"[^}]*"label"\s*:\s*"([^"]+)"[^}]*\}/g; let e;
    while((e=er.exec(m[2]))!==null) evs.push({ts:e[1],label:e[2]});
    if(evs.length) res[m[1]]=evs;
  }
  return Object.keys(res).length?res:null;
}
function mergeEv(obj){

    RUN_EVENTS[k]=evs.map(e=>({ts:e.timestamp||e.ts,label:e.label}));
}

// Detect the index where dry rate first starts ramping up.
// Algorithm:
//   1. Smooth the raw dry rate with a 5-point median to kill spikes.
//   2. Find the first index where the smoothed DR exceeds DR_RAMP_THRESH
//      AND stays above it for at least DR_RAMP_SUSTAIN consecutive points.
// Returns the index into the tHr/dr arrays, or -1 if not found.
const DR_RAMP_THRESH  = 8;   // g/min — must exceed this
const DR_RAMP_SUSTAIN = 4;   // consecutive points above threshold

function detectRampIndex(drVals) {
  const n = drVals.length;
  // 5-point median smooth to suppress spikes
  const sm = drVals.map((_, i) => {
    const w = drVals.slice(Math.max(0,i-2), Math.min(n,i+3));
    const s = [...w].sort((a,b)=>a-b);
    return s[Math.floor(s.length/2)];
  });
  // Find first sustained crossing
  for (let i = 0; i < n - DR_RAMP_SUSTAIN; i++) {
    if (sm[i] >= DR_RAMP_THRESH) {
      let ok = true;
      for (let j = 1; j < DR_RAMP_SUSTAIN; j++) {
        if (sm[i+j] < DR_RAMP_THRESH) { ok=false; break; }
      }
      if (ok) return i;
    }
  }
  return -1;
}

function processCSV(rows){
  rows=rows.filter(r=>r.elapsed_hr!==undefined&&r.elapsed_hr!=='');
  rows.sort((a,b)=>+a.elapsed_hr - +b.elapsed_hr);
  const headers=Object.keys(rows[0]||{});
  if(!allColumns.length) allColumns=headers.filter(h=>h!=='time'&&h!=='elapsed_hr');

  const el=rows.map(r=>parseFloat(r.elapsed_hr));
  const ts=rows.map(r=>r.time||'');

  const channels={};
  for(const h of headers){
    if(h==='time'||h==='elapsed_hr') continue;
    channels[h]=rows.map(r=>{const v=parseFloat(r[h]);return isNaN(v)?0:v;});
  }
  const drKey=resolveCol(headers,'dry_rate_g_min');
  if(drKey) channels[drKey]=channels[drKey].map(v=>Math.min(DR_MAX,Math.max(DR_MIN,v)));

  // ── Oil-temp alignment (original) ─────────────────────────────────────────
  const oilCol=resolveCol(headers,'d208_jacket_oil_temperature')||resolveCol(headers,'jacket_oil_temperature');
  const oils=rows.map(r=>parseFloat(r[oilCol])||0);
  const oilHi=oils.findIndex(t=>t>=OIL_ALIGN);
  const t0oil=oilHi>=0?el[oilHi]:0;
  const t0ts  =oilHi>=0?parseTs(ts[oilHi]):null;
  const tHrOil=el.map(e=>e-t0oil);

  // ── Dry-rate ramp alignment ────────────────────────────────────────────────
  // Use the oil-aligned DR array to detect the ramp, then shift to that point.
  let tHrRamp = tHrOil; // fallback: same as oil if no ramp found
  let rampTs   = t0ts;
  if(drKey){
    const drVals=channels[drKey];
    const ri=detectRampIndex(drVals);
    if(ri>=0){
      const t0ramp=el[ri];
      tHrRamp=el.map(e=>e-t0ramp);
      rampTs=ts[ri]?parseTs(ts[ri]):t0ts;
    }
  }

  // ── Cumulative water removed — computed from ramp-aligned tHr ─────────────
  const tHrActive = tHrRamp; // always integrate from ramp point
  const cumWaterKg=new Array(tHrActive.length).fill(0);
  if(drKey){
    for(let i=1;i<tHrActive.length;i++){
      const dtHr=tHrActive[i]-tHrActive[i-1];
      if(dtHr<=0||dtHr>0.5){cumWaterKg[i]=cumWaterKg[i-1];continue;}
      const dr=tHrActive[i]>=0?Math.max(0,channels[drKey][i]||0):0;
      cumWaterKg[i]=cumWaterKg[i-1]+dr*60*dtHr/1000;
    }
  }

  return {tHrOil,tHrRamp,cumWaterKg,channels,headers,tZeroTs:rampTs,tZeroTsOil:t0ts};
}
function loadRun(name){
  if(datasets[name]) return Promise.resolve(datasets[name]);
  return new Promise((res,rej)=>{
    Papa.parse(BASE+name+'.csv',{download:true,header:true,skipEmptyLines:true,
      complete:r=>{datasets[name]=processCSV(r.data);res(datasets[name]);},error:rej});
  });
}

// ══════════════════════════════════════════════════════════
// DERIVED: Estimated Airflow (CFM)
// Energy-balance method matching the reference Python implementation:
//   ah_q  = ch6_rms × 208 V × (ah_pwm / 100)          [W]
//   rho   = P_atm / (R_air × T_inlet_K)                [kg/m³]
//   kg_s  = ah_q / (Cp_air × ΔT)   where |ΔT| > 2 °C  [kg/s]
//   CFM   = kg_s / rho × 35.3147 × 60,  clipped ≥ 0
// Columns: heat_air_current_rms (ch6_rms), d401 ah_pwm,
//          d403/d405 t_inlet, d408 t_outlet
// ══════════════════════════════════════════════════════════
function computeAirflow(d){
  const {channels,headers}=d;
  const V_SUPPLY  = 208.0;
  const P_ATM     = 101325.0;
  const R_AIR     = 287.05;
  const CP_AIR    = 1006.0;
  const M3_TO_CFM = 35.3147;

  const rmsCol     = resolveCol(headers,'current__ch6_rms');
  const pwmCol     = resolveCol(headers,'d401_air_heater_controller_pwm');
  const tInletCol  = resolveCol(headers,'d403_blower_fan_inlet_temperature_1')
                  || resolveCol(headers,'d405_blower_inlet_temperature_2');
  const tOutletCol = resolveCol(headers,'d408_air_heater_outlet_temperature');

  if(!rmsCol||!pwmCol||!tInletCol||!tOutletCol) return null;

  const rms     = channels[rmsCol];
  const pwm     = channels[pwmCol];
  const tInlet  = channels[tInletCol];
  const tOutlet = channels[tOutletCol];
  const n       = rms.length;
  const result  = new Array(n).fill(NaN);

  for(let i=0;i<n;i++){
    const deltaT = (tOutlet[i]||0) - (tInlet[i]||0);
    if(Math.abs(deltaT) <= 2.0) continue;
    const ahQ  = (rms[i]||0) * V_SUPPLY * ((pwm[i]||0) / 100.0);
    const rho  = P_ATM / (R_AIR * ((tInlet[i]||0) + 273.15));
    const kgS  = ahQ / (CP_AIR * deltaT);
    const cfm  = (M3_TO_CFM * 60.0 * kgS) / rho;
    result[i]  = Math.max(0, cfm);
  }
  return result;
}

// Time-based rolling mean — winMin is a window width in minutes.
// tHr is the elapsed-hours array (non-uniform OK).
// For each point i, averages all points within ±(winMin/2) minutes.
// Falls back to the point itself when no neighbours exist.
function rolling(arr, winMin, tHr) {
  const halfHr = (winMin / 2) / 60;  // half-window in hours
  return arr.map((v, i) => {
    const center = tHr[i];
    const lo_t = center - halfHr;
    const hi_t = center + halfHr;
    // Binary search for left boundary
    let lo = 0, hi = tHr.length - 1;
    while (lo < hi) { const m = (lo + hi) >> 1; if (tHr[m] < lo_t) lo = m + 1; else hi = m; }
    let s = 0, c = 0;
    for (let j = lo; j < tHr.length && tHr[j] <= hi_t; j++) {
      const x = arr[j];
      if (isFinite(x)) { s += x; c++; }
    }
    return c > 0 ? s / c : v;
  });
}
function parseTs(s){return new Date(s.replace(' ','T')).getTime();}
// Returns the active tHr array for a dataset based on current alignMode
function getTHr(d){ return alignMode==='ramp' ? d.tHrRamp : d.tHrOil; }
function getXArr(d){ return xMode==='mass' ? d.cumWaterKg : getTHr(d); }
// Returns the t=0 timestamp for events alignment
function getT0Ts(d){ return alignMode==='ramp' ? d.tZeroTs : d.tZeroTsOil; }
function getVals(runName,m){
  const d=datasets[runName]; if(!d) return null;
  if(m==='__airflow__') return computeAirflow(d);
  if(m==='__total_current__'){
    const cols=[0,1,2,3,4,5,6,7].map(i=>resolveCol(d.headers,`current__ch${i}_rms`)).filter(Boolean);
    if(!cols.length) return null;
    const n=d.channels[cols[0]].length;
    return Array.from({length:n},(_,i)=>cols.reduce((s,c)=>s+(d.channels[c][i]||0),0));
  }
  if(m==='__total_kwh__'){
    const cols=['motor_kwh','oil_kwh','cooling_kwh','blower_kwh','air_kwh'].map(k=>resolveCol(d.headers,k)).filter(Boolean);
    if(!cols.length) return null;
    const n=d.channels[cols[0]].length;
    return Array.from({length:n},(_,i)=>cols.reduce((s,c)=>s+(d.channels[c][i]||0),0));
  }
  const col=resolveCol(d.headers,m); if(!col) return null;
  return d.channels[col];
}

function buildDS(m){
  const out=[];
  for(const name of activeRuns){
    const d=datasets[name]; if(!d) continue;
    const vals=getVals(name,m); if(!vals) continue;
    const xArr=getXArr(d);
    const tHr=getTHr(d);
    const color=RUNS[name].color, sm=rolling(vals,winMin,tHr);
    if(viewMode==='raw'||viewMode==='both')
      out.push({label:name+'_raw',data:xArr.map((x,i)=>({x:+x.toFixed(4),y:+vals[i].toFixed(4)})),
        borderColor:color,backgroundColor:'transparent',borderWidth:viewMode==='both'?0.7:1.2,
        borderDash:viewMode==='both'?[3,3]:[],pointRadius:0,tension:0,parsing:false,_run:name});
    if(viewMode==='smooth'||viewMode==='both')
      out.push({label:name+'_sm',data:xArr.map((x,i)=>({x:+x.toFixed(4),y:+sm[i].toFixed(4)})),
        borderColor:color,backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:0,parsing:false,_run:name});
  }
  return out;
}

function makeEvPlugin(plotId){
  return{id:'ev_'+plotId,afterDraw(chart){
    if(!showEvents) return;
    const{ctx,scales:{x},chartArea:{top,bottom}}=chart;
    for(const name of activeRuns){
      const d=datasets[name]; if(!d||!getT0Ts(d)||!RUN_EVENTS[name]) continue;
      const color=RUNS[name].color;
      RUN_EVENTS[name].forEach((ev,ei)=>{
        const xPx=x.getPixelForValue((parseTs(ev.ts)-getT0Ts(d))/3600000);
        if(xPx<chart.chartArea.left||xPx>chart.chartArea.right) return;
        ctx.save();
        ctx.strokeStyle=color;ctx.globalAlpha=.28;ctx.lineWidth=1;ctx.setLineDash([4,4]);
        ctx.beginPath();ctx.moveTo(xPx,top);ctx.lineTo(xPx,bottom);ctx.stroke();
        ctx.setLineDash([]);ctx.globalAlpha=.65;ctx.fillStyle=color;
        ctx.font='500 9px "JetBrains Mono",monospace';ctx.textAlign='left';
        ctx.translate(xPx+3,Math.min(top+12+(ei%5)*55,bottom-8));
        ctx.rotate(-Math.PI/2);ctx.fillText(ev.label,0,0);ctx.restore();
      });
    }
  }};
}

// ── Dry-rate peak horizontal lines plugin ─────────────────
function makePeakPlugin(plotId, m){
  const isDryRate = m==='dry_rate_g_min';
  return {
    id:'peak_'+plotId,
    afterDraw(chart){
      if(!isDryRate) return;
      const{ctx,scales:{y},chartArea:{left,right}}=chart;
      for(const name of activeRuns){
        const d=datasets[name]; if(!d) continue;
        const vals=getVals(name,m); if(!vals) continue;
        const sm=rolling(vals,winMin,getTHr(d));
        const peak=Math.max(...sm.filter(isFinite));
        if(!isFinite(peak)) continue;
        const yPx=y.getPixelForValue(peak);
        if(yPx<chart.chartArea.top||yPx>chart.chartArea.bottom) continue;
        const color=RUNS[name].color;
        ctx.save();
        ctx.strokeStyle=color; ctx.globalAlpha=0.45; ctx.lineWidth=1;
        ctx.setLineDash([6,4]);
        ctx.beginPath(); ctx.moveTo(left,yPx); ctx.lineTo(right,yPx); ctx.stroke();
        ctx.setLineDash([]);
        ctx.globalAlpha=0.75; ctx.fillStyle=color;
        ctx.font='500 9px "JetBrains Mono",monospace';
        ctx.textAlign='right'; ctx.textBaseline='bottom';
        ctx.fillText(`${name} max: ${peak.toFixed(1)}`,right-4,yPx-2);
        ctx.restore();
      }
    }
  };
}

// Track the full natural x-range per chart for true reset
const chartNativeRange={};

function buildSingleChart(plotId,m){
  const canvas=document.getElementById('canvas-'+plotId);
  const loadEl=document.getElementById('loading-'+plotId);
  if(!canvas) return;
  if(chartInstances[plotId]){chartInstances[plotId].destroy();delete chartInstances[plotId];}
  const dsList=buildDS(m);
  if(!dsList.length){loadEl.textContent='No data — select a run above';loadEl.style.display='flex';updateLegend(plotId,m);return;}
  loadEl.style.display='none';
  const s=getSensor(m);
  const grid='rgba(0,0,0,.05)', tick='#7a7870', fontCfg={family:'"JetBrains Mono",monospace',size:10};
  let yMx=-Infinity,yMn=Infinity;
  dsList.forEach(ds=>ds.data.forEach(p=>{if(p.y>yMx)yMx=p.y;if(p.y<yMn)yMn=p.y;}));
  if(!isFinite(yMx)){yMx=100;yMn=0;}
  const pad=Math.max((yMx-yMn)*.1,1); yMx+=pad; yMn-=pad;
  // Apply manual y-axis override if set
  const ov=yOverride[plotId];
  if(ov){
    if(ov.min!==undefined) yMn=ov.min;
    if(ov.max!==undefined) yMx=ov.max;
  }

  // Compute native x bounds from data
  let xNatMin=Infinity,xNatMax=-Infinity;
  dsList.forEach(ds=>ds.data.forEach(p=>{if(p.x<xNatMin)xNatMin=p.x;if(p.x>xNatMax)xNatMax=p.x;}));
  if(!isFinite(xNatMin)){xNatMin=0;xNatMax=1;}
  chartNativeRange[plotId]={min:xNatMin,max:xNatMax};

  // If zoomed, start new chart at same x window as peers
  let xMin=undefined, xMax=undefined;
  if(hasZoomed){
    const peers=Object.entries(chartInstances).filter(([pid])=>pid!==plotId);
    if(peers.length>0){
      const ref=peers[0][1];
      if(ref?.scales?.x){xMin=ref.scales.x.min; xMax=ref.scales.x.max;}
    }
  }

  const isLast=plotId===activePlots[activePlots.length-1].id;
  const isZoom=interactionMode==='zoom';
  const xLabel = xMode==='mass'
    ? 'Cumulative water removed (kg)'
    : alignMode==='ramp'
      ? 'Time since dry rate ramp start (hr)'
      : 'Elapsed time since oil @ 185°C (hr)';

  // Sync callback — fires on both zoom and pan, live
  function onSync({chart}){
    if(isSyncing) return;
    isSyncing=true;
    const {min,max}=chart.scales.x;
    for(const[pid,c]of Object.entries(chartInstances)){
      if(c===chart) continue;
      c.zoomScale('x',{min,max},'none');
    }
    isSyncing=false;
    markZoomed();
  }

  const chart=new Chart(canvas,{
    type:'line',data:{datasets:dsList},
    options:{responsive:true,maintainAspectRatio:false,animation:false,clip:{left:0,right:0,top:0,bottom:0},
      plugins:{
        legend:{display:false},tooltip:{enabled:false},
        zoom:{
          pan:{
            enabled: interactionMode==='pan',
            mode:'x',
            onPan:onSync,        // live sync while dragging
            onPanComplete:onSync // also fire at end
          },
          zoom:{
            wheel:{enabled:true},
            pinch:{enabled:true},
            drag:{
              enabled:isZoom,
              backgroundColor:'rgba(26,110,60,.08)',
              borderColor:'rgba(26,110,60,.35)',
              borderWidth:1
            },
            mode:'x',
            onZoom:onSync,
            onZoomComplete:onSync
          }
        }
      },
      scales:{
        x:{type:'linear',
          min:xMin, max:xMax,
          title:{display:isLast, text:xLabel, color:tick, font:fontCfg},
          grid:{color:grid},border:{color:'#e3e2dc'},ticks:{color:tick,font:fontCfg,maxTicksLimit:10}},
        y:{title:{display:true,text:s.u||s.l,color:tick,font:fontCfg},
          grid:{color:grid},border:{color:'#e3e2dc'},ticks:{color:tick,font:fontCfg},min:yMn,max:yMx}
      }
    },
    plugins:[makeEvPlugin(plotId), makePeakPlugin(plotId, m)],
  });
  chartInstances[plotId]=chart;
  updateLegend(plotId,m);
}

function setYOverride(plotId){
  const minEl=document.getElementById('ymin-'+plotId);
  const maxEl=document.getElementById('ymax-'+plotId);
  const resetEl=document.getElementById('yreset-'+plotId);
  const minVal=minEl.value.trim(), maxVal=maxEl.value.trim();
  const hasMin=minVal!=='', hasMax=maxVal!=='';
  if(!hasMin&&!hasMax){ resetYOverride(plotId); return; }
  yOverride[plotId]={};
  if(hasMin){ yOverride[plotId].min=parseFloat(minVal); minEl.classList.add('active'); }
  else minEl.classList.remove('active');
  if(hasMax){ yOverride[plotId].max=parseFloat(maxVal); maxEl.classList.add('active'); }
  else maxEl.classList.remove('active');
  if(resetEl) resetEl.style.display='inline';
  const p=activePlots.find(p=>p.id===plotId); if(p) buildSingleChart(plotId,p.m);
}
function resetYOverride(plotId){
  delete yOverride[plotId];
  const minEl=document.getElementById('ymin-'+plotId);
  const maxEl=document.getElementById('ymax-'+plotId);
  const resetEl=document.getElementById('yreset-'+plotId);
  if(minEl){minEl.value='';minEl.classList.remove('active');}
  if(maxEl){maxEl.value='';maxEl.classList.remove('active');}
  if(resetEl) resetEl.style.display='none';
  const p=activePlots.find(p=>p.id===plotId); if(p) buildSingleChart(plotId,p.m);
}
function rebuildAll(){activePlots.forEach(({id,m})=>buildSingleChart(id,m));}

// ══════════════════════════════════════════════════════════
// LEGEND
// ══════════════════════════════════════════════════════════
function updateLegend(plotId,m){
  const el=document.getElementById('legend-'+plotId); if(!el) return;
  el.innerHTML='';
  for(const name of activeRuns){
    const d=datasets[name]; if(!d) continue;
    const vals=getVals(name,m); if(!vals) continue;
    const sm=rolling(vals,winMin,getTHr(d)), peak=Math.max(...sm.filter(isFinite));
    el.innerHTML+=`<div class="legend-item">
      <span class="legend-dot" style="background:${RUNS[name].color}"></span>
      <span>${name}</span>
      <span class="legend-peak">peak ${isFinite(peak)?peak.toFixed(2):'—'}</span>
    </div>`;
  }
}

// ══════════════════════════════════════════════════════════
// CROSSHAIR + TOOLTIP
// ══════════════════════════════════════════════════════════
function onMouseMove(e,plotId){
  const chart=chartInstances[plotId]; if(!chart) return;
  const ca=chart.chartArea, rect=chart.canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left;
  if(mx<ca.left||mx>ca.right){hideCross();return;}
  const xVal=chart.scales.x.getValueForPixel(mx);
  const cRect=document.getElementById('charts-container').getBoundingClientRect();
  const ch=document.getElementById('crosshair-overlay');
  ch.style.display='block'; ch.style.left=e.clientX+'px';
  ch.style.top=cRect.top+'px'; ch.style.height=cRect.height+'px';
  if(showTooltip && interactionMode!=='pan') showTT(e.clientX,e.clientY,xVal);
  else document.getElementById('tooltip-card').style.display='none';
}

function showTT(cx,cy,xVal){
  const card=document.getElementById('tooltip-card');
  const xLabel=xMode==='mass'
    ? `water = ${xVal.toFixed(3)} kg`
    : alignMode==='ramp'
      ? `t_ramp = ${xVal.toFixed(3)} hr`
      : `t_oil = ${xVal.toFixed(3)} hr`;
  let html=`<div class="tt-time">${xLabel}</div>`;
  for(const{id,m}of activePlots){
    const s=getSensor(m);
    html+=`<div class="tt-sect">${s.l}</div>`;
    for(const name of activeRuns){
      const d=datasets[name]; if(!d) continue;
      const vals=getVals(name,m); if(!vals) continue;
      const xArr=getXArr(d);
      let lo=0,hi=xArr.length-1;
      while(lo<hi-1){const mid=(lo+hi)>>1;if(xArr[mid]<=xVal)lo=mid;else hi=mid;}
      // For tooltip, look up the value closest to xVal
      // In smooth mode, use the pre-rolled array; in raw mode, use raw vals.
      // We compute rolling lazily here only for the tooltip reading.
      const src=viewMode==='raw'?vals:rolling(vals,winMin,getTHr(d));
      const v=src[lo];
      html+=`<div class="tt-row">
        <span class="tt-dot" style="background:${RUNS[name].color}"></span>
        <span class="tt-run">${name}</span>
        <span class="tt-val">${isFinite(v)?v.toFixed(2):'—'}${s.u?' '+s.u:''}</span>
      </div>`;
    }
  }
  card.innerHTML=html; card.style.display='block';
  const tw=290;
  let left=cx+14,top=cy-20;
  if(left+tw>window.innerWidth-10) left=cx-tw-10;
  if(top+220>window.innerHeight-10) top=window.innerHeight-230;
  card.style.left=left+'px'; card.style.top=top+'px';
}

function hideCross(){
  document.getElementById('crosshair-overlay').style.display='none';
  document.getElementById('tooltip-card').style.display='none';
}

// ══════════════════════════════════════════════════════════
// ZOOM / PAN
// ══════════════════════════════════════════════════════════
function setInteraction(mode){
  interactionMode=mode;
  document.getElementById('btnZoom').classList.toggle('active',mode==='zoom');
  document.getElementById('btnPan').classList.toggle('active',mode==='pan');
  for(const chart of Object.values(chartInstances)){
    chart.options.plugins.zoom.pan.enabled=(mode==='pan');
    chart.options.plugins.zoom.zoom.drag.enabled=(mode==='zoom');
    chart.update('none');
  }
  document.querySelectorAll('.chart-canvas-wrap').forEach(w=>{
    w.style.cursor=mode==='pan'?'grab':'crosshair';
  });
  if(mode==='pan') hideCross();
}
function markZoomed(){hasZoomed=true;document.getElementById('zoomReset').classList.add('vis');}
function resetAllZoom(){
  isSyncing=true;
  for(const[pid,c]of Object.entries(chartInstances)){
    const range=chartNativeRange[pid];
    if(range) c.zoomScale('x',{min:range.min,max:range.max},'none');
    else c.resetZoom('none');
  }
  isSyncing=false;
  hasZoomed=false;
  document.getElementById('zoomReset').classList.remove('vis');
}

// ══════════════════════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════════════════════
function toggleTooltip(){
  showTooltip=!showTooltip;
  document.getElementById('ttBtn').classList.toggle('on',showTooltip);
  if(!showTooltip) document.getElementById('tooltip-card').style.display='none';
}
function setAlign(mode){
  alignMode=mode;
  document.getElementById('btnAlignOil').classList.toggle('active',mode==='oil');
  document.getElementById('btnAlignRamp').classList.toggle('active',mode==='ramp');
  hasZoomed=false;
  document.getElementById('zoomReset').classList.remove('vis');
  rebuildAll();
}
function setXMode(mode){
  xMode=mode;
  document.getElementById('btnXTime').classList.toggle('active',mode==='time');
  document.getElementById('btnXMass').classList.toggle('active',mode==='mass');
  hasZoomed=false;
  document.getElementById('zoomReset').classList.remove('vis');
  rebuildAll();
}
function setView(v){
  viewMode=v;
  ['Raw','Smooth','Both'].forEach(s=>document.getElementById('btn'+s).classList.toggle('active',v===s.toLowerCase()));
  rebuildAll();
}
function onSlider(v){winMin=parseInt(v);document.getElementById('winVal').textContent=v+' min';rebuildAll();}
function toggleEvents(){
  showEvents=!showEvents;
  document.getElementById('evBtn').classList.toggle('on',showEvents);
  Object.values(chartInstances).forEach(c=>c.update('none'));
}

// ══════════════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════════════
function openChannelPicker(){
  modalSelected.clear();
  document.getElementById('modalSearch').value='';
  renderModal('');
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

function renderModal(filter){
  const f=filter.toLowerCase();
  const body=document.getElementById('modalBody'); body.innerHTML='';
  // Group known sensors
  const groups={};
  const seen=new Set();
  for(const s of SENSORS){
    if(seen.has(s.m)) continue; seen.add(s.m);
    if(f&&!s.l.toLowerCase().includes(f)&&!s.m.toLowerCase().includes(f)) continue;
    if(!groups[s.g]) groups[s.g]=[];
    groups[s.g].push(s);
  }
  for(const[grp,defs]of Object.entries(groups)){
    if(!defs.length) continue;
    const gl=document.createElement('div'); gl.className='modal-group-label'; gl.textContent=grp; body.appendChild(gl);
    const grid=document.createElement('div'); grid.className='modal-cols'; body.appendChild(grid);
    defs.forEach(s=>{
      const isSel=modalSelected.has(s.m), isActive=!!activePlots.find(p=>p.m===s.m);
      const div=document.createElement('div'); div.className='mci'+(isSel?' sel':'');
      div.innerHTML=`<span class="chk">${isSel?'✓':''}</span>
        <span style="display:inline-block;width:7px;height:7px;border-radius:1px;background:${s.c};flex-shrink:0;"></span>
        <span>${s.l}${isActive?' ✓':''}</span><span class="unit">${s.u}</span>`;
      div.onclick=()=>{
        modalSelected.has(s.m)?modalSelected.delete(s.m):modalSelected.add(s.m);
        renderModal(document.getElementById('modalSearch').value);
      };
      grid.appendChild(div);
    });
  }
  // Raw columns (not matched by any sensor def)
  // Build a set of all known sensor column names for exact exclusion
  const SENSOR_NAMES = new Set(SENSORS.map(s=>s.m.toLowerCase()).filter(m=>!m.startsWith('__')));
  // Additional explicit exclusions (removed sensors + all raw current/TC channel variants)
  const EXCLUDED_RAW = new Set([
    'd202_oil_heater_controller_pwm_2','d202_oil_heater_controller_pwm_3',
    'internal_chip_temp','condenser_out_airflow',
    // raw TC bare channel names (pre-measurement-prefix era)
    'ch0','ch1','ch2','ch3','ch4','ch5','ch6','ch7',
    // old friendly TC names (pre-CSV-column-name era)
    'wall_high_temp','wall_low_temp','cond_in_temp','cond_out_temp',
    'cool_air_in_temp','heat_air_out_temp','cool_air_out_temp','ambient_temp',
    // old short-name current variants (peak, w, rms)
    'ch0_peak','ch0_rms','ch0_w','ch1_peak','ch1_rms','ch1_w',
    'ch2_peak','ch2_rms','ch3_peak','ch3_rms',
    'ch4_peak','ch4_rms','ch4_w','ch5_peak','ch5_rms',
    'ch6_peak','ch6_rms','ch6_w','ch7_peak','ch7_rms','ch7_w',
    // old friendly-name current variants
    'motor_current_rms','motor_current_peak','motor_power',
    'oil_heat_1_current_rms','oil_heat_1_current_peak','oil_heat_1_power',
    'pv_current_rms','pv_current_peak',
    'spare_current_rms','spare_current_peak',
    'cond_current_rms','cond_current_peak','cond_power',
    'air_box_current_rms','air_box_current_peak',
    'heat_air_current_rms','heat_air_current_peak','heat_air_power',
    'blower_current_rms','blower_current_peak','blower_power',
  ]);
  if(allColumns.length){
    const raw=allColumns.filter(col=>{
      const lc=col.toLowerCase();
      if(SENSOR_NAMES.has(lc)) return false;
      if(EXCLUDED_RAW.has(lc)) return false;
      // Exclude all current__chX_* variants (peak, rms, w) not already in SENSORS
      if(/^current__ch\d_(rms|peak|w)$/.test(lc)) return false;
      // Exclude all thermocouples__chX variants not already in SENSORS
      if(/^thermocouples__ch\d$/.test(lc)) return false;
      // Also exclude by substring for long d-prefixed sensor column names
      if(SENSORS.some(s=>!s.m.startsWith('__')&&lc.includes(s.m.toLowerCase()))) return false;
      if(f&&!lc.includes(f)) return false;
      return true;
    });
    if(raw.length){
      const gl=document.createElement('div'); gl.className='modal-group-label'; gl.textContent='Raw Columns'; body.appendChild(gl);
      const grid=document.createElement('div'); grid.className='modal-cols'; body.appendChild(grid);
      raw.slice(0,80).forEach(col=>{
        const isSel=modalSelected.has(col);
        const div=document.createElement('div'); div.className='mci'+(isSel?' sel':'');
        div.innerHTML=`<span class="chk">${isSel?'✓':''}</span><span>${col}</span>`;
        div.onclick=()=>{modalSelected.has(col)?modalSelected.delete(col):modalSelected.add(col);renderModal(document.getElementById('modalSearch').value);};
        grid.appendChild(div);
      });
    }
  }
}

function filterModal(v){renderModal(v);}
function confirmModal(){
  modalSelected.forEach(m=>{if(!activePlots.find(p=>p.m===m)) addPlot(m);});
  closeModal();
}
document.getElementById('modalOverlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modalOverlay')) closeModal();
});

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
async function init(){
  document.getElementById('statusText').textContent='discovering runs…';
  await discoverRuns();
  const defs=['0422','0423','0427','0505'];
  defs.forEach(n=>{if(RUNS[n]) activeRuns.add(n);});
  if(!activeRuns.size) Object.keys(RUNS).slice(0,2).forEach(n=>activeRuns.add(n));
  renderPills();
  document.getElementById('initLoading').remove();
  renderAllPlots(); renderChipStrip();
  document.getElementById('statusText').textContent='loading data…';
  await Promise.all([...activeRuns].map(n=>loadRun(n).catch(()=>activeRuns.delete(n))));
  rebuildAll(); renderChipStrip();
  document.getElementById('statusText').textContent=`${Object.keys(RUNS).length} runs · ${Object.keys(datasets).length} loaded`;
}
init();
